name: Bump prompt-lib versions

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Check versions match
        run: |
          SHARED_VERSION=$(node -p "require('./prompt-shared-state/package.json').version")
          UI_VERSION=$(node -p "require('./prompt-ui-components/package.json').version")

          if [ "$SHARED_VERSION" != "$UI_VERSION" ]; then
            echo "Error: Version mismatch between packages:"
            echo "  prompt-shared-state: $SHARED_VERSION"
            echo "  prompt-ui-components: $UI_VERSION"
            exit 1
          fi

      - name: Bump versions
        run: |
          cd prompt-shared-state
          yarn version ${{ inputs.bump_type }} --no-git-tag-version
          cd ../prompt-ui-components
          yarn version ${{ inputs.bump_type }} --no-git-tag-version

      - name: Prepare branch name
        id: branch
        run: |
          VERSION=$(node -p "require('./prompt-shared-state/package.json').version")
          BRANCH="chore/bump-version-$VERSION"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.branch.outputs.branch }}
          commit-message: chore: bump prompt-lib version to ${{ steps.branch.outputs.version }}
          title: chore: bump prompt-lib version to ${{ steps.branch.outputs.version }}
          body: |
            Automated version bump.

            Bump type: **${{ inputs.bump_type }}**
          add-paths: |
            prompt-shared-state/package.json
            prompt-ui-components/package.json
