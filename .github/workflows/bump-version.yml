name: Bump prompt-lib versions

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare branch name
        id: branch
        run: |
          VERSION=$(node -p "require('./prompt-shared-state/package.json').version")
          BRANCH="chore/bump-version-$VERSION"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.branch.outputs.branch }}
          commit-message: chore: bump prompt-lib version to ${{ steps.branch.outputs.version }}
          title: chore: bump prompt-lib version to ${{ steps.branch.outputs.version }}
          body: |
            Automated version bump.

            Bump type: **${{ inputs.bump_type }}**
          add-paths: |
            prompt-shared-state/package.json
            prompt-ui-components/package.json
